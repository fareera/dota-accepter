name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install opencv-python mss pyautogui pywin32 requests pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name dota-accepter --console main.py

      - name: Prepare release package
        run: |
          mkdir release
          copy dist\dota-accepter.exe release\
          copy config.example.json release\
          mkdir release\templates
          copy templates\.gitkeep release\templates\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota-accepter-windows-x64
          path: release/
